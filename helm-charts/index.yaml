    description: 'A Helm chart for IBM Usage Metering installation. IBM products can
      integrate with Usage Metering Service (UMS) that is used to capture two types
      of product usage metrics: contractual metrics for compliance purposes, and adoption
      metrics for various scenarios related to usage analysis. UMS is intended to
      allow products capture business value metrics for the purpose of creating compliance
      evidence for the auditing purposes and visualizing metric usage in reporting
      tools.'
