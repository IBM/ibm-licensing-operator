{{- if .Values.ibmLicensing.createRBAC }}
{{- if not ((.Values.ibmLicensing.spec).features).nssEnabled }}
---
# Operand role (unrestricted): cluster-wide workload reads for the ibm-license-service operand SA. Rendered only when namespace-scope is off (nssEnabled != true).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-license-service
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      {{- if not ((.Values.ibmLicensing.spec).features).nssEnabled }}
      - namespaces
      {{- end }}
      {{- if ((.Values.ibmLicensing.spec).features).nodeCpuCappingEnabled }}
      - nodes
      {{- end }}
    verbs:
      - get
      - list
  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
    verbs:
      - get
      - list
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - get
      - list
  - apiGroups:
      - metrics.k8s.io
    resources:
      - pods
    verbs:
      - get
      - list
  {{- if ((.Values.ibmLicensing.spec).features).customResourcesEnabled }}
  - apiGroups:
      - operator.ibm.com
    resources:
      - ibmlicensingmetadatas
      - ibmlicensingdefinitions
      - ibmlicensingquerysources
    verbs:
      - get
      - list
  {{- end }}
  {{- if ((.Values.ibmLicensing.spec).features).kubeRBACAuthEnabled }}
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
  {{- end }}
{{- end }}
{{- if eq (include "ibm-licensing.restrictedClusterRoleNeeded" .) "true" }}
---
# Operand role (namespace-scoped / nss): for the ibm-license-service-restricted operand SA. Rendered whenever namespace-scope is on; it always carries the cluster-wide metadata reads the operand needs, plus the node (CPU capping) and kube-RBAC auth rules when those features are enabled.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-license-service-restricted
rules:
  {{- if ((.Values.ibmLicensing.spec).features).nodeCpuCappingEnabled }}
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
  {{- end }}
  {{- if ((.Values.ibmLicensing.spec).features).customResourcesEnabled }}
  - apiGroups:
      - operator.ibm.com
    resources:
      - ibmlicensingmetadatas
      - ibmlicensingdefinitions
      - ibmlicensingquerysources
    verbs:
      - get
      - list
  {{- end }}
  {{- if ((.Values.ibmLicensing.spec).features).kubeRBACAuthEnabled }}
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
  {{- end }}
{{- end }}
{{- if .Values.ibmLicensing.createRBACReaderRole }}
---
# Reader endpoint (NOT the operator): grants GET on the License Service HTTP URLs to the ibm-licensing-default-reader SA, consumed by API readers. Rendered only when createRBACReaderRole=true (default).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-licensing-default-reader
rules:
  - nonResourceURLs:
      - /products
      - /snapshot
      - /bundled_products
      - /health
      - /status
      - /services
      - /workloads
    verbs:
      - get
{{- end }}
{{- if not ((.Values.ibmLicensing.spec).features).nssEnabled }}
---
# Binds the unrestricted operand ClusterRole to the ibm-license-service SA. Gated in lockstep with that ClusterRole so the binding never dangles.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-license-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ibm-license-service
subjects:
  - kind: ServiceAccount
    name: ibm-license-service
    namespace: {{ .Values.ibmLicensing.namespace }}
{{- end }}
{{- if eq (include "ibm-licensing.restrictedClusterRoleNeeded" .) "true" }}
---
# Binds the restricted operand ClusterRole to the ibm-license-service-restricted SA. Gated in lockstep with that ClusterRole so the binding never dangles.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-license-service-restricted
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ibm-license-service-restricted
subjects:
  - kind: ServiceAccount
    name: ibm-license-service-restricted
    namespace: {{ .Values.ibmLicensing.namespace }}
{{- end }}
{{- if .Values.ibmLicensing.createRBACReaderRole }}
---
# Binds the reader ClusterRole to the ibm-licensing-default-reader SA (the reader-token identity). Rendered only when createRBACReaderRole=true (default).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-licensing-default-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ibm-licensing-default-reader
subjects:
  - kind: ServiceAccount
    name: ibm-licensing-default-reader
    namespace: {{ .Values.ibmLicensing.namespace }}
{{- end }}
{{- end }}
