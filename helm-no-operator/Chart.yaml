apiVersion: v2
name: ibm-licensing-no-operator
description: "A Helm chart for License Service deployed without the operator. You can use License Service to retrieve license usage data from your cluster and create a licensing snapshot.
 License Service collects and measures the license usage of your IBM® products at the cluster level. You can retrieve this data upon request for monitoring and compliance. You can also retrieve an audit snapshot of the data that is audit evidence. License Service is required for monitoring and measuring license usage of the IBM Cloud Paks® and IBM® stand-alone containerized software in accord with the pricing rule for containerized environments. Manual license measurements are not allowed."
type: application
version: 4.2.23
icon: https://www.ibm.com/brand/experience-guides/developer/b1db1ae501d522a1a4b49613fe07c9f1/01_8-bar-positive.svg
home: https://ibm.biz/license-service
sources:
  - https://github.com/IBM/ibm-licensing-operator
maintainers:
  - name: IBM

annotations:
  charts.openshift.io/provider: IBM
  charts.openshift.io/name: ibm-licensing-no-operator
  charts.openshift.io/sources: https://github.com/IBM/ibm-licensing-operator
  charts.openshift.io/source-url: https://github.com/IBM/ibm-licensing-operator
  artifacthub.io/readme: |
    # IBM License Service Helm Chart (without the operator)
    
    This Helm chart installs IBM License Service without installing the IBM Licensing Operator. Currently only limited features are supported.
    IBM License Service collects and measures the license usage of your IBM® products at the cluster level. You can retrieve this data upon request for monitoring and compliance.
    
    **Supported platforms**
    
    Red Hat OpenShift Container Platform 4.10 or newer installed on Linux x86_64, Linux on Power (ppc64le), Linux on IBM Z and LinuxONE.
    
