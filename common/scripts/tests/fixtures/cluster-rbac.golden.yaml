{{- if eq (lower (.Values.ibmLicensing.createRBAC | toString)) "true" }}
---
{{- if eq (include "ibm-licensing.unrestrictedClusterRoleNeeded" .) "true" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-license-service
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      {{- if eq (include "ibm-licensing.namespaceDiscoveryEnabled" .) "true" }}
      - namespaces
      {{- end }}
      {{- if eq (include "ibm-licensing.nodeCpuCappingEnabled" .) "true" }}
      - nodes
      {{- end }}
    verbs:
      - get
      - list
  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
    verbs:
      - get
      - list
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - get
      - list
  - apiGroups:
      - metrics.k8s.io
    resources:
      - pods
    verbs:
      - get
      - list
  - apiGroups:
      - operator.ibm.com
    resources:
      - ibmlicensingmetadatas
      - ibmlicensingdefinitions
      - ibmlicensingquerysources
    verbs:
      - get
      - list
  {{- if eq (include "ibm-licensing.kubeRBACAuthEnabled" .) "true" }}
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  {{- end }}
  {{- if eq (include "ibm-licensing.kubeRBACAuthEnabled" .) "true" }}
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
  {{- end }}
{{- end }}
---
{{- if eq (include "ibm-licensing.restrictedClusterRoleNeeded" .) "true" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-license-service-restricted
rules:
  {{- if or (eq (include "ibm-licensing.namespaceDiscoveryEnabled" .) "true") (eq (include "ibm-licensing.nodeCpuCappingEnabled" .) "true") }}
  - apiGroups:
      - ""
    resources:
      {{- if eq (include "ibm-licensing.namespaceDiscoveryEnabled" .) "true" }}
      - namespaces
      {{- end }}
      {{- if eq (include "ibm-licensing.nodeCpuCappingEnabled" .) "true" }}
      - nodes
      {{- end }}
    verbs:
      - get
      - list
  {{- end }}
  - apiGroups:
      - operator.ibm.com
    resources:
      - ibmlicensingmetadatas
      - ibmlicensingdefinitions
      - ibmlicensingquerysources
    verbs:
      - get
      - list
  {{- if eq (include "ibm-licensing.kubeRBACAuthEnabled" .) "true" }}
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  {{- end }}
  {{- if eq (include "ibm-licensing.kubeRBACAuthEnabled" .) "true" }}
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
  {{- end }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-licensing-default-reader
rules:
  - nonResourceURLs:
      - /products
      - /snapshot
      - /bundled_products
      - /health
      - /status
      - /services
      - /workloads
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-licensing-operator
rules:
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  {{- if eq (include "ibm-licensing.operatorClusterDiscoveryNeeded" .) "true" }}
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
  {{- end }}
  - apiGroups:
      - operator.ibm.com
    resources:
      - ibmlicensings
      - ibmlicensings/finalizers
      - ibmlicensings/status
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  {{- if eq (include "ibm-licensing.operandRequestsEnabled" .) "true" }}
  - apiGroups:
      - operator.ibm.com
    resources:
      - operandrequests
      - operandrequests/finalizers
      - operandrequests/status
    verbs:
      - get
      - list
      - patch
      - update
      - watch
  {{- end }}
  {{- if eq (include "ibm-licensing.operatorClusterDiscoveryNeeded" .) "true" }}
  - apiGroups:
      - operator.openshift.io
    resources:
      - servicecas
    verbs:
      - list
  {{- end }}
---
{{- if eq (include "ibm-licensing.unrestrictedClusterRoleNeeded" .) "true" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-license-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ibm-license-service
subjects:
  - kind: ServiceAccount
    name: ibm-license-service
    namespace: {{ .Values.ibmLicensing.namespace }}
{{- end }}
---
{{- if eq (include "ibm-licensing.restrictedClusterRoleNeeded" .) "true" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-license-service-restricted
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ibm-license-service-restricted
subjects:
  - kind: ServiceAccount
    name: ibm-license-service-restricted
    namespace: {{ .Values.ibmLicensing.namespace }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-licensing-default-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ibm-licensing-default-reader
subjects:
  - kind: ServiceAccount
    name: ibm-licensing-default-reader
    namespace: {{ .Values.ibmLicensing.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-licensing-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ibm-licensing-operator
subjects:
  - kind: ServiceAccount
    name: ibm-licensing-operator
    namespace: {{ .Values.ibmLicensing.namespace }}
---
{{- if eq (include "ibm-licensing.clusterMonitoringNeeded" .) "true" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-license-service-cluster-monitoring-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: {{ include "ibm-licensing.operandServiceAccount" . }}
    namespace: {{ .Values.ibmLicensing.namespace }}
{{- end }}
{{- end }}
