version: "2"

run:
  # timeout for analysis, e.g. 30s, 5m, default is 1m
  timeout: 10m

linters:
  # please, do not use `enable-all`: it's deprecated and will be removed soon.
  # inverted configuration with `enable-all` and `disable` is not scalable during updates of golangci-lint
  disable-all: true
  enable:
    # Default linters
    - errcheck    # Detects unchecked errors
    - staticcheck # It finds bugs, performance issues, and simplifications (includes gosimple + unused)
    - ineffassign # Detects unused variable assigments
    - govet       # Examines Go source code and reports suspicious constructs

    # Additional linters
    - gocyclo  # Computes and checks the cyclomatic complexity of functions
    - revive   # Drop-in replacement of golint
    - misspell # Fix spelling errors
    - goconst  # Detects repeated strings that could by replaced by constant
    - unconvert # Analyse type converstions
    - unparam  # Check for unused function parameter
    - lll      # Check if max line-length is satisfied
    - nakedret # Finds naked returns in functions
    - gosec    # Inspects source code for security problems

  # don't enable:
  # - gocritic
  # - bodyclose
  # - depguard
  # - dogsled
  # - dupl
  # - funlen
  # - gochecknoglobals
  # - gochecknoinits
  # - gocognit
  # - godox
  # - prealloc
  # - whitespace
  # - stylecheck

  settings:
    errcheck:
      # report about not checking of errors in type assetions: `a := b.(MyStruct)`;
      # default is false: such cases aren't reported by default.
      check-type-assertions: false

      # report about assignment of errors to blank identifier: `num, _ := strconv.Atoi(numStr)`;
      # default is false: such cases aren't reported by default.
      check-blank: false
    revive:
      # minimal confidence for issues, default is 0.8
      confidence: 0.0
      rules:
        # Disable comment-format rules — pre-existing violations throughout the codebase
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
    gosec:
      excludes:
        - G101 # Look for hard coded credentials
        - G304 # Potential file inclusion via variable (false positive for operator config file reads)
        - G118 # Context cancel func assigned to a slice element is not detected by gosec
    misspell:
      # Correct spellings using locale preferences for US or UK.
      # Default is to use a neutral variety of English.
      # Setting locale to US will correct the British spelling of 'colour' to 'color'.
      locale: US
      ignore-words:
        - cancelled
    lll:
      # max line length, lines longer will be reported. Default is 120.
      # '\t' is counted as 1 character by default, and can be changed with the tab-width option
      line-length: 250
      # tab width in spaces. Default to 1.
      tab-width: 1
    unparam:
      # Inspect exported functions, default is false. Set to true if no external program/library imports your code.
      # XXX: if you enable this setting, unparam will report a lot of false-positives in text editors:
      # if it's called for subdir of a project it can't find external interfaces. All text editor integrations
      # with golangci-lint call it on a directory with the changed file.
      check-exported: false
    gocritic:
      enabled-checks:
        - appendCombine
        - argOrder
        - assignOp
        - badCond
        - boolExprSimplify
        - builtinShadow
        - captLocal
        - caseOrder
        - codegenComment
        - commentedOutCode
        - commentedOutImport
        - defaultCaseOrder
        - deprecatedComment
        - docStub
        - dupArg
        - dupBranchBody
        - dupCase
        - dupSubExpr
        - elseif
        - emptyFallthrough
        - equalFold
        - flagDeref
        - flagName
        - hexLiteral
        - indexAlloc
        - initClause
        - methodExprCall
        - nilValReturn
        - octalLiteral
        - offBy1
        - rangeExprCopy
        - regexpMust
        - sloppyLen
        - stringXbytes
        - switchTrue
        - typeAssertChain
        - typeSwitchVar
        - typeUnparen
        - underef
        - unlambda
        - unnecessaryBlock
        - unslice
        - valSwap
        - weakCond

  exclusions:
    paths:
      - ".*\\.pb\\.go"
      - ".*\\.gen\\.go"
      - ".*\\_test\\.go"
      - genfiles$
      - vendor
      - testing$

    rules:
      # Exclude errcheck from running on test files.
      - path: _test\.go$|^tests/|^samples/|^vendor/
        linters:
          - errcheck
      # SA1019: result.Requeue is deprecated in controller-runtime — pre-existing, non-breaking
      - text: "SA1019: .* is deprecated"
        linters:
          - staticcheck
      # QF1008: cosmetic embedded-field selector simplification
      - text: "QF1008:"
        linters:
          - staticcheck

formatters:
  enable:
    - gofmt    # Formats Go programs
    - goimports # Import formatting/ordering

  settings:
    gofmt:
      # simplify code: gofmt with `-s` option, true by default
      simplify: true
    goimports:
      # put imports beginning with prefix after 3rd-party packages;
      # it's a comma-separated list of prefixes
      local-prefixes: github.com/IBM/

  exclusions:
    paths:
      - ".*\\.pb\\.go"
      - ".*\\.gen\\.go"
      - ".*\\_test\\.go"
      - genfiles$
      - vendor
      - testing$

issues:
  # Maximum issues count per one linter. Set to 0 to disable. Default is 50.
  max-issues-per-linter: 0

  # Maximum count of issues with the same text. Set to 0 to disable. Default is 3.
  max-same-issues: 0
