{{- if eq (lower (.Values.ibmLicensing.createRBAC | toString)) "true" }}
---
{{- if eq (include "ibm-licensing.unrestrictedClusterRoleNeeded" .) "true" }}
# Operand role (unrestricted): cluster-wide workload reads for the ibm-license-service operand SA. Rendered only when namespace-scope is off (nssEnabled != true).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-license-service
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      {{- if eq (include "ibm-licensing.namespaceDiscoveryEnabled" .) "true" }}
      - namespaces
      {{- end }}
      {{- if eq (include "ibm-licensing.nodeCpuCappingEnabled" .) "true" }}
      - nodes
      {{- end }}
    verbs:
      - get
      - list
  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
    verbs:
      - get
      - list
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - get
      - list
  - apiGroups:
      - metrics.k8s.io
    resources:
      - pods
    verbs:
      - get
      - list
  {{- if eq (include "ibm-licensing.kubeRBACAuthEnabled" .) "true" }}
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
  {{- end }}
{{- end }}
---
{{- if eq (include "ibm-licensing.restrictedClusterRoleNeeded" .) "true" }}
# Operand role (namespace-scoped / nss): for the ibm-license-service-restricted operand SA. Survives only while a cluster-scoped rule remains (node reads for CPU capping, or the kube-RBAC auth create rules); otherwise the whole object is dropped.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-license-service-restricted
rules:
  {{- if or (eq (include "ibm-licensing.namespaceDiscoveryEnabled" .) "true") (eq (include "ibm-licensing.nodeCpuCappingEnabled" .) "true") }}
  - apiGroups:
      - ""
    resources:
      {{- if eq (include "ibm-licensing.namespaceDiscoveryEnabled" .) "true" }}
      - namespaces
      {{- end }}
      {{- if eq (include "ibm-licensing.nodeCpuCappingEnabled" .) "true" }}
      - nodes
      {{- end }}
    verbs:
      - get
      - list
  {{- end }}
  {{- if eq (include "ibm-licensing.kubeRBACAuthEnabled" .) "true" }}
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
  {{- end }}
{{- end }}
---
# Reader endpoint (NOT the operator): grants GET on the License Service HTTP URLs to the ibm-licensing-default-reader SA, consumed by API readers. The operator only provisions its token. Always rendered.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-licensing-default-reader
rules:
  - nonResourceURLs:
      - /products
      - /snapshot
      - /bundled_products
      - /health
      - /status
      - /services
      - /workloads
    verbs:
      - get
---
# Operator control-plane role: bound to the operator pod SA (ibm-licensing-operator). The cluster-scoped IBMLicensing CR watch is irreducible, so this ClusterRole always renders.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-licensing-operator
rules:
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  {{- if eq (include "ibm-licensing.operatorClusterDiscoveryNeeded" .) "true" }}
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
  {{- end }}
  - apiGroups:
      - operator.ibm.com
    resources:
      - ibmlicensings
      - ibmlicensings/finalizers
      - ibmlicensings/status
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  {{- if eq (include "ibm-licensing.operandRequestsEnabled" .) "true" }}
  - apiGroups:
      - operator.ibm.com
    resources:
      - operandrequests
      - operandrequests/finalizers
      - operandrequests/status
    verbs:
      - get
      - list
      - patch
      - update
      - watch
  {{- end }}
  {{- if eq (include "ibm-licensing.operatorClusterDiscoveryNeeded" .) "true" }}
  - apiGroups:
      - operator.openshift.io
    resources:
      - servicecas
    verbs:
      - list
  {{- end }}
---
{{- if eq (include "ibm-licensing.unrestrictedClusterRoleNeeded" .) "true" }}
# Binds the unrestricted operand ClusterRole to the ibm-license-service SA. Gated in lockstep with that ClusterRole so the binding never dangles.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-license-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ibm-license-service
subjects:
  - kind: ServiceAccount
    name: ibm-license-service
    namespace: {{ .Values.ibmLicensing.namespace }}
{{- end }}
---
{{- if eq (include "ibm-licensing.restrictedClusterRoleNeeded" .) "true" }}
# Binds the restricted operand ClusterRole to the ibm-license-service-restricted SA. Gated in lockstep with that ClusterRole so the binding never dangles.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-license-service-restricted
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ibm-license-service-restricted
subjects:
  - kind: ServiceAccount
    name: ibm-license-service-restricted
    namespace: {{ .Values.ibmLicensing.namespace }}
{{- end }}
---
# Binds the reader ClusterRole to the ibm-licensing-default-reader SA (the reader-token identity). Always rendered.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-licensing-default-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ibm-licensing-default-reader
subjects:
  - kind: ServiceAccount
    name: ibm-licensing-default-reader
    namespace: {{ .Values.ibmLicensing.namespace }}
---
# Binds the operator control-plane ClusterRole to the operator pod SA. Always rendered.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-licensing-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ibm-licensing-operator
subjects:
  - kind: ServiceAccount
    name: ibm-licensing-operator
    namespace: {{ .Values.ibmLicensing.namespace }}
---
{{- if eq (include "ibm-licensing.clusterMonitoringNeeded" .) "true" }}
# Cluster monitoring read path: needed only for datasource=prometheus; the subject follows the active operand SA.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: ibm-licensing-operator
    app.kubernetes.io/managed-by: ibm-licensing-operator
    app.kubernetes.io/name: ibm-licensing
    component-id: {{ .Chart.Name }}
  name: ibm-license-service-cluster-monitoring-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: {{ include "ibm-licensing.operandServiceAccount" . }}
    namespace: {{ .Values.ibmLicensing.namespace }}
{{- end }}
{{- end }}
