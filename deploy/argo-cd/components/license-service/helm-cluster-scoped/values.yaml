global:
  imagePullPrefix: icr.io
  imagePullSecret: ibm-entitlement-key
  licenseAccept: true

ibmLicensing:
  namespace: ibm-licensing
  watchNamespace: ibm-licensing
  imageRegistryNamespaceOperator: cpopen
  imageRegistryNamespaceOperand: cpopen/cpfs
  createRBAC: true
  spec:
    version: 4.2.23
    datasource: datacollector
    httpsEnable: true
    features:
      nssEnabled: false                      # true => operand scoped to the watchNamespace set / nssConfigMap; no cluster-wide namespaces RBAC
      nodeCpuCappingEnabled: true            # false => no node-access RBAC
      kubeRBACAuthEnabled: true              # false => no tokenreviews/subjectaccessreviews RBAC
      operandRequestsEnabled: true           # false => no OperandRequest RBAC
